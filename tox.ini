[tox]
envlist = py{36,37,38}-docker
skipsdist = true

[testenv]
deps = -r requirements-dev.txt
commands_pre =
    gh-actions: echo "::group::tox: docker setup"
    docker: docker exec es elasticsearch-plugin -s install analysis-icu
    docker: docker restart es
    gh-actions: echo "::endgroup::"
    gh-actions: echo "::group::tox: textblob setup"
    python -m textblob.download_corpora
    gh-actions: echo "::endgroup::"
commands =
    gh-actions: echo "::group::tox: pytest"
    pytest {posargs:--disable-warnings -v tests}
    gh-actions: echo "::endgroup::"
passenv = SIMPLIFIED_*
setenv =
    docker: SIMPLIFIED_TEST_DATABASE=postgres://simplified_test:test@localhost:9005/simplified_circulation_test
    docker: SIMPLIFIED_TEST_ELASTICSEARCH=http://localhost:9006
docker =
    docker: es
    docker: db
allowlist_externals =
    docker: docker
    gh-actions: echo
    python

[docker:db]
image = postgres:12
environment =
    POSTGRES_USER=simplified_test
    POSTGRES_PASSWORD=test
    POSTGRES_DB=simplified_circulation_test
ports =
    9005:5432/tcp

[docker:es]
image = elasticsearch:6.8.6
environment =
    discovery.type=single-node
ports =
    9006:9200/tcp

[gh-actions]
python =
    3.6: py36
    3.7: py37
    3.8: py38
